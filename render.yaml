services:
  - type: web
    name: vod-report-tracker
    env: python
    plan: starter            # paid plan — no free-tier sleep
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"      # force Python 3.11 — psycopg2-binary not yet compatible with 3.14
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard — Neon Postgres connection string
      - key: CRON_SECRET
        generateValue: true  # Shared secret for all cron job endpoints
      - key: APP_BASE_URL
        sync: false          # e.g. https://vod-report-tracker.onrender.com  (no trailing slash)

  # ── Ruckus import 07:00 SAST (05:00 UTC) ──────────────────────────────────
  - type: cron
    name: vod-ruckus-import-0700
    env: python
    rootDir: app
    schedule: "0 5 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -c "
      import os, requests;
      base = os.environ.get('APP_BASE_URL','').rstrip('/');
      secret = os.environ.get('CRON_SECRET','');
      r = requests.post(base+'/api/cron/ruckus-import',
          headers={'Authorization':'Bearer '+secret}, timeout=60);
      print(r.status_code, r.text[:300])
      "
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false

  # ── Ruckus import 14:00 SAST (12:00 UTC) ──────────────────────────────────
  - type: cron
    name: vod-ruckus-import-1400
    env: python
    rootDir: app
    schedule: "0 12 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -c "
      import os, requests;
      base = os.environ.get('APP_BASE_URL','').rstrip('/');
      secret = os.environ.get('CRON_SECRET','');
      r = requests.post(base+'/api/cron/ruckus-import',
          headers={'Authorization':'Bearer '+secret}, timeout=60);
      print(r.status_code, r.text[:300])
      "
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false

  # ── Freshdesk sync 06:15 SAST (04:15 UTC) ─────────────────────────────────
