{% extends 'base.html' %}
{% block title %}Log Visit / Check-in - {{ APP_NAME }}{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-geo-alt"></i> Log Visit / Check-in</h2>
<div class="row"><div class="col-lg-9"><div class="card"><div class="card-body">
<form method="POST" enctype="multipart/form-data"><div class="row g-3">
  <div class="col-md-6"><label class="form-label">Support Person *</label><select name="agent_id" class="form-select" required>{% for agent in agents %}<option value="{{ agent.id }}" {% if active_agent_id == agent.id %}selected{% endif %}>{{ agent.name }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Date *</label><input type="date" name="date" class="form-control" value="{{ today }}" required></div>
  <div class="col-md-6"><label class="form-label">Site *</label><select name="site_id" class="form-select" id="siteSelect" onchange="handleSiteSelect(this)" required><option value="">Select a site</option>{% for site in sites %}<option value="{{ site.id }}" data-visit-type="{{ site.visit_type or site.region }}">{{ site.name }}</option>{% endfor %}<option value="other">Other</option></select></div>
  <div class="col-md-6"><label class="form-label">Visit Type</label><select name="visit_type" id="visitType" class="form-select"><option value="on_site">On-site</option><option value="teams">Teams / Remote</option></select></div>
  <div class="col-md-6" id="customSiteDiv" style="display:none"><label class="form-label">Custom Site Name *</label><input type="text" name="site_name" id="siteNameInput" class="form-control"></div>
  <div class="col-md-6"><label class="form-label">Person Spoken To</label><input type="text" name="contact_person" class="form-control"></div>
  <div class="col-md-6"><label class="form-label">Location / Department</label><input type="text" name="location" class="form-control"></div>
  <div class="col-12"><label class="form-label">Discussion Summary</label><textarea name="discussion_topics" class="form-control" rows="3"></textarea></div>
  <div class="col-md-6"><label class="form-label">Issues Raised</label><textarea name="issues_raised" class="form-control" rows="3"></textarea></div>
  <div class="col-md-6"><label class="form-label">Opportunities Identified</label><textarea name="opportunities_identified" class="form-control" rows="3"></textarea></div>
  <div class="col-12"><label class="form-label">Client Satisfaction / Information Obtained</label><textarea name="info_obtained" class="form-control" rows="2"></textarea></div>
  <div class="col-md-4"><label class="form-label">Follow-up Required</label><select name="follow_up_required" class="form-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
  <div class="col-md-4"><label class="form-label">Follow-up Owner</label><input type="text" name="follow_up_owner" class="form-control"></div>
  <div class="col-md-4"><label class="form-label">Follow-up Due Date</label><input type="date" name="follow_up_due_date" class="form-control"></div>
  <div class="col-12"><label class="form-label">Follow-up Actions</label><textarea name="follow_up_actions" class="form-control" rows="2"></textarea></div>
  <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
  <div class="col-12"><label class="form-label">Attachment / Photo</label><input type="file" name="attachment" class="form-control"></div>
  <div class="col-12 d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save</button><a href="{{ url_for('site_visits') }}" class="btn btn-outline-secondary">Cancel</a></div>
</div></form>
</div></div></div></div>
<script>
function normalizeVisitType(value) {
  value = (value || '').toLowerCase();
  return (value === 'teams' || value === 'far_reach' || value === 'remote') ? 'teams' : 'on_site';
}
function handleSiteSelect(sel) {
  var customDiv = document.getElementById('customSiteDiv');
  var customInput = document.getElementById('siteNameInput');
  if (sel.value === 'other') { customDiv.style.display = 'block'; customInput.required = true; }
  else { customDiv.style.display = 'none'; customInput.required = false; customInput.value = ''; }
  var selected = sel.options[sel.selectedIndex];
  if (selected && selected.dataset.visitType) document.getElementById('visitType').value = normalizeVisitType(selected.dataset.visitType);
}
</script>
{% endblock %}
