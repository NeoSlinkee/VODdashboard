{% extends 'base.html' %}
{% block title %}Add Monitoring - {{ APP_NAME }}{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-wifi"></i> Log Ruckus Monitoring</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Support Engineer *</label>
                                <select name="agent_id" class="form-select" required>
                                    <option value="">Select Agent...</option>
                                    {% for agent in agents %}
                                    <option value="{{ agent.id }}">{{ agent.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Date *</label>
                                <input type="date" name="date" class="form-control" value="{{ today }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Site Name *</label>
                                <input type="text" name="site_name" class="form-control" required placeholder="Site from Ruckus Controller">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Purpose</label>
                                <input type="text" name="purpose" class="form-control" placeholder="Proactive Monitoring" value="Proactive Monitoring">
                            </div>
                        </div>
                    </div>
                    
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h6><i class="bi bi-router"></i> Access Point Status</h6>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">APs Offline</label>
                                        <input type="number" name="aps_offline" class="form-control" value="0" min="0">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Total APs</label>
                                        <input type="number" name="aps_total" class="form-control" value="0" min="0">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Issues Detected</label>
                        <div class="form-check">
                            <input type="checkbox" name="network_issues" class="form-check-input" id="network_issues">
                            <label class="form-check-label" for="network_issues">Network Connectivity Issues</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" name="site_migration" class="form-check-input" id="site_migration">
                            <label class="form-check-label" for="site_migration">Site Migration</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Issues Found (Details)</label>
                        <textarea name="issues_found" class="form-control" rows="2" placeholder="Describe any issues found..."></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Resolution Status</label>
                        <select name="resolution_status" class="form-select">
                            <option value="resolved">Resolved</option>
                            <option value="pending">Pending</option>
                            <option value="escalated">Escalated</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="2"></textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Log
                        </button>
                        <a href="{{ url_for('monitoring') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
