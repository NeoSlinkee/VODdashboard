{% extends 'base.html' %}
{% block title %}Edit Site - {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div><h2><i class="bi bi-pencil-square me-2" style="color:var(--vod-gold)"></i>Edit Site</h2><p class="text-muted mb-0 small">{{ site.name }}</p></div>
  <a href="{{ url_for('sites') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="row"><div class="col-md-8 col-lg-7"><div class="card"><div class="card-body">
<form method="POST"><div class="row g-3">
  <div class="col-12"><label class="form-label">Site Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" required value="{{ site.name }}"></div>
  <div class="col-md-6"><label class="form-label">Group / Customer</label><input type="text" name="brand" class="form-control" value="{{ site.brand or '' }}"></div>
  <div class="col-md-6"><label class="form-label">Physical Location</label><input type="text" name="city" class="form-control" value="{{ site.city or '' }}"></div>
  <div class="col-md-6"><label class="form-label">Visit Type</label><select name="visit_type" class="form-select"><option value="on_site" {% if (site.visit_type or site.region) in ['on_site','within_reach'] %}selected{% endif %}>On-site</option><option value="teams" {% if (site.visit_type or site.region) in ['teams','far_reach'] %}selected{% endif %}>Teams / Remote</option></select></div>
  <div class="col-md-6"><label class="form-label">Monthly Requirement</label><input type="number" name="monthly_requirement" class="form-control" min="0" value="{{ site.monthly_requirement or 1 }}"></div>
  <div class="col-md-6"><label class="form-label">Allocation Month</label><input type="month" name="allocation_month" class="form-control" value="{{ site.allocation_month or '' }}"></div>
  <div class="col-md-6"><label class="form-label">Assigned Support Person</label><select name="assigned_agent_id" class="form-select"><option value="">Unassigned</option>{% for a in agents %}<option value="{{ a.id }}" {% if site.assigned_agent_id == a.id %}selected{% endif %}>{{ a.name }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Priority</label><select name="priority_level" class="form-select"><option value="normal" {% if site.priority_level == 'normal' or not site.priority_level %}selected{% endif %}>Normal</option><option value="high" {% if site.priority_level == 'high' %}selected{% endif %}>High</option><option value="low" {% if site.priority_level == 'low' %}selected{% endif %}>Low</option></select></div>
  <div class="col-md-6"><label class="form-label">Total APs</label><input type="number" name="total_aps" class="form-control" min="0" value="{{ site.total_aps or 0 }}"></div>
  <div class="col-12"><label class="form-label">SmartZone Alias</label><input type="text" name="ruckus_zone_name" class="form-control" value="{{ site.ruckus_zone_name or '' }}"></div>
  <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="3">{{ site.notes or '' }}</textarea></div>
  <div class="col-12 d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Changes</button><a href="{{ url_for('sites') }}" class="btn btn-outline-secondary">Cancel</a></div>
</div></form>
</div></div></div></div>
{% endblock %}
