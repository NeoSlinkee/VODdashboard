{% extends 'base.html' %}
{% block title %}Edit Site - {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><div><h2><i class="bi bi-pencil-square me-2" style="color:var(--vod-gold)"></i>Edit Site</h2><p class="text-muted mb-0 small">{{ site.name }}</p></div><a href="{{ url_for('sites') }}" class="btn btn-outline-secondary btn-sm">Back</a></div>
<div class="row"><div class="col-lg-9"><div class="card"><div class="card-body"><form method="POST"><div class="row g-3">
<div class="col-md-8"><label class="form-label">Site Name *</label><input name="name" class="form-control" required value="{{ site.name }}"></div><div class="col-md-4"><label class="form-label">Group / Customer</label><input name="brand" class="form-control" value="{{ site.brand or '' }}"></div>
<div class="col-md-4"><label class="form-label">City</label><input name="city" class="form-control" value="{{ site.city or '' }}"></div><div class="col-md-4"><label class="form-label">Province</label><input name="province" class="form-control" value="{{ site.province or '' }}"></div><div class="col-md-4"><label class="form-label">Site Status</label><select name="site_status" class="form-select"><option value="active" {% if site.site_status == 'active' %}selected{% endif %}>Active</option><option value="inactive" {% if site.site_status == 'inactive' %}selected{% endif %}>Inactive</option><option value="former_customer" {% if site.site_status == 'former_customer' %}selected{% endif %}>Former Customer</option><option value="project_only" {% if site.site_status == 'project_only' %}selected{% endif %}>Project Only</option><option value="pending_confirmation" {% if site.site_status == 'pending_confirmation' %}selected{% endif %}>Pending Confirmation</option></select></div>
<div class="col-md-4"><label class="form-label">Visit Type</label><select name="visit_type" class="form-select"><option value="on_site" {% if site.visit_type == 'on_site' %}selected{% endif %}>On-site</option><option value="teams" {% if site.visit_type == 'teams' %}selected{% endif %}>Teams / Remote</option></select></div><div class="col-md-4"><label class="form-label">Visit Frequency</label><input name="visit_frequency" class="form-control" value="{{ site.visit_frequency or 'monthly' }}"></div><div class="col-md-4"><label class="form-label">Monthly Requirement</label><input type="number" name="monthly_requirement" class="form-control" min="0" value="{{ site.monthly_requirement or 0 }}"></div>
<div class="col-md-4"><label class="form-label">Primary Owner</label><select name="assigned_agent_id" class="form-select"><option value="">Unassigned</option>{% for a in agents %}<option value="{{ a.id }}" {% if site.assigned_agent_id == a.id %}selected{% endif %}>{{ a.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Backup Owner</label><select name="backup_agent_id" class="form-select"><option value="">None</option>{% for a in agents %}<option value="{{ a.id }}" {% if site.backup_agent_id == a.id %}selected{% endif %}>{{ a.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Next Due Date</label><input type="date" name="next_due_date" class="form-control" value="{{ site.next_due_date.strftime('%Y-%m-%d') if site.next_due_date else '' }}"></div>
<div class="col-md-4"><label class="form-label">SLA Status</label><select name="sla_status" class="form-select"><option value="unknown" {% if site.sla_status == 'unknown' %}selected{% endif %}>Unknown</option><option value="yes" {% if site.sla_status == 'yes' %}selected{% endif %}>Yes</option><option value="no" {% if site.sla_status == 'no' %}selected{% endif %}>No</option></select></div><div class="col-md-8"><label class="form-label">Products / Services Supported</label><input name="products_supported" class="form-control" value="{{ site.products_supported or '' }}"></div>
<div class="col-md-4"><label class="form-label">Follow-up Required</label><select name="follow_up_required" class="form-select"><option value="no" {% if not site.follow_up_required %}selected{% endif %}>No</option><option value="yes" {% if site.follow_up_required %}selected{% endif %}>Yes</option></select></div><div class="col-md-8"><label class="form-label">Follow-up Owner</label><input name="follow_up_owner" class="form-control" value="{{ site.follow_up_owner or '' }}"></div>
<div class="col-md-6"><label class="form-label">Priority</label><select name="priority_level" class="form-select"><option value="normal" {% if site.priority_level == 'normal' %}selected{% endif %}>Normal</option><option value="high" {% if site.priority_level == 'high' %}selected{% endif %}>High</option><option value="low" {% if site.priority_level == 'low' %}selected{% endif %}>Low</option></select></div><div class="col-md-6"><label class="form-label">Total APs</label><input type="number" name="total_aps" class="form-control" min="0" value="{{ site.total_aps or 0 }}"></div>
<div class="col-12"><label class="form-label">SmartZone Alias</label><input name="ruckus_zone_name" class="form-control" value="{{ site.ruckus_zone_name or '' }}"></div><div class="col-12"><label class="form-label">Notes</label><textarea name="notes" rows="3" class="form-control">{{ site.notes or '' }}</textarea></div>
<div class="col-12 d-flex gap-2"><button class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Changes</button><a href="{{ url_for('sites') }}" class="btn btn-outline-secondary">Cancel</a></div>
</div></form></div></div></div></div>
{% endblock %}
