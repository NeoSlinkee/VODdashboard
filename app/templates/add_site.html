{% extends 'base.html' %}
{% block title %}Add Site - {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div><h2><i class="bi bi-building-add me-2" style="color:var(--vod-gold)"></i>Add Site</h2><p class="text-muted mb-0 small">Register a site for monthly support allocation</p></div>
  <a href="{{ url_for('sites') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="row"><div class="col-md-8 col-lg-7"><div class="card"><div class="card-body">
<form method="POST"><div class="row g-3">
  <div class="col-12"><label class="form-label">Site Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Group / Customer</label><input type="text" name="brand" class="form-control"></div>
  <div class="col-md-6"><label class="form-label">Physical Location</label><input type="text" name="city" class="form-control"></div>
  <div class="col-md-6"><label class="form-label">Visit Type</label><select name="visit_type" class="form-select"><option value="on_site">On-site</option><option value="teams">Teams / Remote</option></select></div>
  <div class="col-md-6"><label class="form-label">Monthly Requirement</label><input type="number" name="monthly_requirement" class="form-control" min="0" value="1"></div>
  <div class="col-md-6"><label class="form-label">Allocation Month</label><input type="month" name="allocation_month" class="form-control"></div>
  <div class="col-md-6"><label class="form-label">Assigned Support Person</label><select name="assigned_agent_id" class="form-select"><option value="">Unassigned</option>{% for a in agents %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Priority</label><select name="priority_level" class="form-select"><option value="normal" selected>Normal</option><option value="high">High</option><option value="low">Low</option></select></div>
  <div class="col-md-6"><label class="form-label">Total APs</label><input type="number" name="total_aps" class="form-control" min="0" value="0"></div>
  <div class="col-12"><label class="form-label">SmartZone Alias</label><input type="text" name="ruckus_zone_name" class="form-control"><div class="form-text">Leave blank to use the site name.</div></div>
  <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="3"></textarea></div>
  <div class="col-12 d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Add Site</button><a href="{{ url_for('sites') }}" class="btn btn-outline-secondary">Cancel</a></div>
</div></form>
</div></div></div></div>
{% endblock %}
