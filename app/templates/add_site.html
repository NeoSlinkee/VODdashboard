{% extends 'base.html' %}
{% block title %}Add Site - {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><div><h2><i class="bi bi-building-add me-2" style="color:var(--vod-gold)"></i>Add Site</h2><p class="text-muted mb-0 small">Register a site for active support allocation</p></div><a href="{{ url_for('sites') }}" class="btn btn-outline-secondary btn-sm">Back</a></div>
<div class="row"><div class="col-lg-9"><div class="card"><div class="card-body"><form method="POST"><div class="row g-3">
<div class="col-md-8"><label class="form-label">Site Name *</label><input name="name" class="form-control" required></div><div class="col-md-4"><label class="form-label">Group / Customer</label><input name="brand" class="form-control"></div>
<div class="col-md-4"><label class="form-label">City</label><input name="city" class="form-control"></div><div class="col-md-4"><label class="form-label">Province</label><input name="province" class="form-control"></div><div class="col-md-4"><label class="form-label">Site Status</label><select name="site_status" class="form-select"><option value="active">Active</option><option value="inactive">Inactive</option><option value="former_customer">Former Customer</option><option value="project_only">Project Only</option><option value="pending_confirmation">Pending Confirmation</option></select></div>
<div class="col-md-4"><label class="form-label">Visit Type</label><select name="visit_type" class="form-select"><option value="on_site">On-site</option><option value="teams">Teams / Remote</option></select></div><div class="col-md-4"><label class="form-label">Visit Frequency</label><input name="visit_frequency" class="form-control" value="monthly"></div><div class="col-md-4"><label class="form-label">Monthly Requirement</label><input type="number" name="monthly_requirement" class="form-control" min="0" value="1"></div>
<div class="col-md-4"><label class="form-label">Primary Owner</label><select name="assigned_agent_id" class="form-select"><option value="">Unassigned</option>{% for a in agents %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Backup Owner</label><select name="backup_agent_id" class="form-select"><option value="">None</option>{% for a in agents %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Next Due Date</label><input type="date" name="next_due_date" class="form-control"></div>
<div class="col-md-4"><label class="form-label">SLA Status</label><select name="sla_status" class="form-select"><option value="unknown">Unknown</option><option value="yes">Yes</option><option value="no">No</option></select></div><div class="col-md-8"><label class="form-label">Products / Services Supported</label><input name="products_supported" class="form-control" placeholder="IPTV, HSIA, Wireless/APs, TeamViewer..."></div>
<div class="col-md-4"><label class="form-label">Follow-up Required</label><select name="follow_up_required" class="form-select"><option value="no">No</option><option value="yes">Yes</option></select></div><div class="col-md-8"><label class="form-label">Follow-up Owner</label><input name="follow_up_owner" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Priority</label><select name="priority_level" class="form-select"><option value="normal">Normal</option><option value="high">High</option><option value="low">Low</option></select></div><div class="col-md-6"><label class="form-label">Total APs</label><input type="number" name="total_aps" class="form-control" min="0" value="0"></div>
<div class="col-12"><label class="form-label">SmartZone Alias</label><input name="ruckus_zone_name" class="form-control"></div><div class="col-12"><label class="form-label">Notes</label><textarea name="notes" rows="3" class="form-control"></textarea></div>
<div class="col-12 d-flex gap-2"><button class="btn btn-primary"><i class="bi bi-save me-1"></i>Add Site</button><a href="{{ url_for('sites') }}" class="btn btn-outline-secondary">Cancel</a></div>
</div></form></div></div></div></div>
{% endblock %}
