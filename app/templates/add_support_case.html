{% extends "base.html" %}
{% block title %}New Support Case – {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('support_cases') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0">Open New Support Case</h4>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post" action="{{ url_for('add_support_case') }}">

          <div class="mb-3">
            <label class="form-label text-muted" style="font-size:.8rem;text-transform:uppercase;">Customer / Organisation <span class="text-danger">*</span></label>
            <input type="text" name="customer_name" class="form-control bg-dark text-white border-secondary"
                   required maxlength="200" placeholder="e.g. VODGroup – Site XYZ">
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label text-muted" style="font-size:.8rem;text-transform:uppercase;">Channel</label>
              <select name="channel" class="form-select bg-dark text-white border-secondary">
                {% for ch in channels %}
                  <option value="{{ ch }}">{{ ch|capitalize }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted" style="font-size:.8rem;text-transform:uppercase;">Priority</label>
              <select name="priority" class="form-select bg-dark text-white border-secondary">
                {% for p in priorities %}
                  <option value="{{ p }}" {{ 'selected' if p == 'medium' }}>{{ p|capitalize }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted" style="font-size:.8rem;text-transform:uppercase;">Summary <span class="text-danger">*</span></label>
            <textarea name="summary" class="form-control bg-dark text-white border-secondary"
                      rows="3" required maxlength="500"
                      placeholder="Brief description of the customer's issue"></textarea>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label text-muted" style="font-size:.8rem;text-transform:uppercase;">Assign To</label>
              <select name="assigned_agent_id" class="form-select bg-dark text-white border-secondary">
                <option value="">Unassigned</option>
                {% for a in agents %}
                  <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted" style="font-size:.8rem;text-transform:uppercase;">Freshdesk Ticket # (optional)</label>
              <input type="text" name="ticket_number" class="form-control bg-dark text-white border-secondary"
                     maxlength="50" placeholder="e.g. 12345">
            </div>
          </div>

          <div class="d-flex gap-2 pt-2">
            <button type="submit" class="btn" style="background:#c9a84c;color:#1a1a1a;font-weight:600;">
              <i class="bi bi-plus-lg me-1"></i>Open Case
            </button>
            <a href="{{ url_for('support_cases') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
